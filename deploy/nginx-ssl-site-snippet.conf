client_max_body_size 2m;
limit_conn landing_conn 40;

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

location ~ /\.(?!well-known) {
    deny all;
}

location = /api/admin/login {
    limit_req zone=landing_login burst=2 nodelay;
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/agentum-proxy.conf;
}

location = /api/leads {
    limit_req zone=landing_leads burst=3 nodelay;
    client_max_body_size 64k;
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/agentum-proxy.conf;
}

location /api/ {
    limit_req zone=landing_api burst=30 nodelay;
    client_max_body_size 256k;
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/agentum-proxy.conf;
}

location / {
    proxy_pass http://127.0.0.1:3000;
    include /etc/nginx/snippets/agentum-proxy.conf;
}
